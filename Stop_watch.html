<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StopWatch</title>
    <style>
        body{
            
            justify-content: center;
            display: flex;
            height:80vh;
            align-items: center;
        }
        h2{
            color:chocolate;
        }
        #stopwatch{
            background-color:wheat;
            text-align: center;
            border: 2px solid black;
            padding:32px 32px 32px 32px;
            border-radius: 18px;
            box-shadow: 3px 3px 5px lightcyan;
        }
        .btn{
            padding:24px 24px 24px 24px;
            margin:10px 10px 10px 10px;
            text-justify: auto;
            border-radius: 8px;
            border:3px solid;
            cursor: pointer;
        }
        .btn:hover{
            background-color:bisque;
            color: blue;
            border-color: black; 
                       
        }
    </style>
</head>
<body>
    <div id="stopwatch">
        <h2>STOP WATCH</h2>
        <h1 id ="watch"><i>0</i></h1>
        <button class="btn" onclick="start()">START</button>
        <button class="btn" onclick="pause()">PAUSE</button>
        <button class="btn" onclick="reset()">RESET</button>
    </div>
    <script>
        let seconds=0;
        let timer;
        function start(){
            if (!timer){
                timer=setInterval(updateTime, 1000);
            } 
        }
        function updateTime(){
            seconds++;
            document.getElementById("watch").innerHTML=seconds;
        }
        function pause(){
            clearInterval(timer);
            timer=null;
        }
        function reset(){
            seconds=0;
            clearInterval(timer);
            document.getElementById("watch").innerHTML = seconds;
            timer=null;
        }
    </script>
</body>
</html>
